# Port Aplikasi
server.port=9000

# Konfigurasi Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_cafe_kel3?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfigurasi JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Konfigurasi Thymeleaf (Matikan cache agar perubahan HTML langsung terlihat)
spring.thymeleaf.cache=false

# --- PENGATURAN BARU UNTUK UPLOAD GAMBAR ---

# Mengaktifkan fitur multipart upload
spring.servlet.multipart.enabled=true

# Batas maksimal ukuran satu file (Contoh: 5MB)
spring.servlet.multipart.max-file-size=5MB

# Batas maksimal total ukuran file dalam satu request (Contoh: 5MB)
spring.servlet.multipart.max-request-size=5MB

# Lokasi penyimpanan file (opsional, untuk membantu pengelolaan di beberapa OS)
# spring.servlet.multipart.location=/tmp