<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ulasan - Agatha Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #F9F6EE; }
        .sidebar {
            height: 100vh;
            background-color: #1E4633;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar h3 { color: #F2542D; }
        .sidebar a {
            color: white; text-decoration: none; display: block; padding: 10px 20px; font-weight: 500;
        }
        .sidebar a:hover { background-color: #2d6a4f; }
        .content { margin-left: 250px; padding: 40px; }
        .section-title { color: #1E4633; border-bottom: 3px solid #F2542D; display: inline-block; margin-bottom: 30px; padding-bottom: 5px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/user-sidebar :: sidebar}"></div>

<div class="content">
    <div class="mb-5 pb-5">
        <h2 class="fw-bold section-title">Ulasan Pelanggan</h2>

        <!-- Tampilkan Ulasan -->
        <div class="row mb-5">
            <div class="col-md-6 mb-3" th:each="ulasan : ${daftarUlasan}">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body">
                        <h6 class="fw-bold text-primary" th:text="${ulasan.namaPelanggan}"></h6>
                        <div class="mb-2 text-warning">
                            <span th:text="'★'.repeat(ulasan.rating) + '☆'.repeat(5 - ulasan.rating)"></span>
                        </div>
                        <p class="mb-0 text-muted" style="font-style: italic;">"<span th:text="${ulasan.komentar}"></span>"</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Tambah Ulasan -->
        <div class="card shadow-sm border-0 bg-white p-4">
            <h5 class="fw-bold mb-3">Tinggalkan Ulasan Anda</h5>
            <form th:action="@{/kirim-ulasan}" method="post">
                <input type="text" name="namaPelanggan" class="form-control mb-3" placeholder="Nama Anda" required>
                <textarea name="komentar" class="form-control mb-3" placeholder="Bagaimana pengalaman Anda?" required rows="3"></textarea>
                <div class="mb-3">
                    <label class="form-label">Rating (1-5)</label>
                    <input type="number" name="rating" class="form-control" min="1" max="5" value="5" required>
                </div>
                <button class="btn btn-success">Kirim Ulasan</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
