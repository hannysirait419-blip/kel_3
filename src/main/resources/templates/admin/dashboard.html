<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Menu - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f4; }
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white; text-decoration: none; display: block; padding: 10px 20px;
        }
        .sidebar a:hover { background-color: #495057; }
        .content { margin-left: 250px; padding: 20px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="content">
    <h2 class="fw-bold mb-4">Kelola Menu</h2>

    <div class="card p-4 shadow mb-5">
        <h4 class="mb-3">Tambah Menu</h4>
        <form th:action="@{/admin/menu/simpan}" method="post">
            <input type="text" name="nama" class="form-control mb-3" placeholder="Nama Menu" required>
            <input type="text" name="kategori" class="form-control mb-3" placeholder="Kategori" required>
            <input type="number" name="harga" class="form-control mb-3" placeholder="Harga" required>
            <textarea name="deskripsi" class="form-control mb-3" placeholder="Deskripsi"></textarea>
            <input type="file" name="gambarFile" class="form-control mb-3">
            <button class="btn btn-success">Simpan Menu</button>
        </form>

        <h4 class="mt-5 mb-3">Data Menu</h4>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="menu : ${daftarMenu}">
                <td th:text="${menu.nama}"></td>
                <td th:text="${menu.kategori}"></td>
                <td th:text="${menu.harga}"></td>
                <td>
                    <a th:href="@{/admin/menu/hapus/{id}(id=${menu.id})}" class="btn btn-danger btn-sm">Hapus</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
