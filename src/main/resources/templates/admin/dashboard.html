<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Agatha Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: #212529; color: white; position: fixed; width: 250px; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #343a40; color: white; border-left: 4px solid #198754; }
        .content { margin-left: 250px; padding: 40px; }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h4 class="text-center fw-bold mb-4 text-success">ADMIN PANEL</h4>
        <a th:href="@{/admin/dashboard}" class="active">🏠 Dashboard</a>
        <a th:href="@{/admin/menu}">🍴 Kelola Menu</a>
        <a th:href="@{/admin/galeri}">📸 Kelola Galeri</a>
        <a th:href="@{/admin/ulasan}">💬 Kelola Ulasan</a>
        <div class="px-3 mt-5">
            <a th:href="@{/logout}" class="btn btn-danger w-100">Logout</a>
        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <h2 class="fw-bold mb-1">Selamat Datang, Admin!</h2>
        <p class="text-muted mb-4">Panel kendali Agatha Cafe</p>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card stat-card shadow-sm bg-primary text-white p-3">
                    <h3>Menu</h3>
                    <p>Kelola daftar makanan & minuman</p>
                    <a th:href="@{/admin/menu}" class="btn btn-light btn-sm w-50">Buka</a>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card stat-card shadow-sm bg-success text-white p-3">
                    <h3>Galeri</h3>
                    <p>Update foto-foto cafe terbaru</p>
                    <a th:href="@{/admin/galeri}" class="btn btn-light btn-sm w-50">Buka</a>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card stat-card shadow-sm bg-warning text-dark p-3">
                    <h3>Ulasan</h3>
                    <p>Lihat feedback dari pelanggan</p>
                    <a th:href="@{/admin/ulasan}" class="btn btn-dark btn-sm w-50 text-white">Buka</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
