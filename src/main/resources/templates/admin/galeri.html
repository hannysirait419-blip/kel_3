<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Galeri - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f4; }
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white; text-decoration: none; display: block; padding: 10px 20px;
        }
        .sidebar a:hover { background-color: #495057; }
        .content { margin-left: 250px; padding: 20px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="content">
    <h2 class="fw-bold mb-4">Kelola Galeri</h2>

    <div class="card p-4 shadow mb-5">
        <h4 class="mb-3">Tambah Galeri</h4>
        <form th:action="@{/admin/galeri/simpan}" method="post">
            <input type="text" name="judul" class="form-control mb-3" placeholder="Judul Foto" required>
            <textarea name="deskripsi" class="form-control mb-3" placeholder="Deskripsi Singkat"></textarea>
            <input type="text" name="gambarUrl" class="form-control mb-3" placeholder="URL Gambar" required>
            <button class="btn btn-success">Simpan Galeri</button>
        </form>

        <h4 class="mt-5 mb-3">Data Galeri</h4>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>Gambar</th>
                <th>Judul</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="galeri : ${daftarGaleri}">
                <td>
                    <img th:src="${galeri.gambarUrl}" style="height:50px; width:50px; object-fit:cover;">
                </td>
                <td th:text="${galeri.judul}"></td>
                <td>
                    <a th:href="@{/admin/galeri/hapus/{id}(id=${galeri.id})}" class="btn btn-danger btn-sm">Hapus</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
