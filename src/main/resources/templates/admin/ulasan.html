<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Ulasan - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f4; }
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white; text-decoration: none; display: block; padding: 10px 20px;
        }
        .sidebar a:hover { background-color: #495057; }
        .content { margin-left: 250px; padding: 20px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<div class="content">
    <h2 class="fw-bold mb-4">Kelola Ulasan</h2>

    <div class="card p-4 shadow mb-5">
        <h4 class="mb-3">Data Ulasan</h4>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>Pelanggan</th>
                <th>Komentar</th>
                <th>Rating</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ulasan : ${daftarUlasan}">
                <td th:text="${ulasan.namaPelanggan}"></td>
                <td th:text="${ulasan.komentar}"></td>
                <td th:text="${ulasan.rating}"></td>
                <td>
                    <a th:href="@{/admin/ulasan/hapus/{id}(id=${ulasan.id})}" class="btn btn-danger btn-sm">Hapus</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
