<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Kelola Ulasan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: #212529; color: white; position: fixed; width: 250px; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #343a40; color: white; border-left: 4px solid #198754; }
        .content { margin-left: 250px; padding: 40px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center fw-bold mb-4">ADMIN PANEL</h4>
        <a th:href="@{/admin/menu}">Kelola Menu</a>
        <a th:href="@{/admin/galeri}">Kelola Galeri</a>
        <a th:href="@{/admin/ulasan}" class="active">Kelola Ulasan</a>
        <div class="px-3 mt-5">
            <a th:href="@{/logout}" class="btn btn-danger text-white text-center p-2 w-100">Logout</a>
        </div>
    </div>

    <div class="content">
        <h2 class="fw-bold mb-4">Daftar Ulasan Pelanggan</h2>
        
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3">Nama Pelanggan</th>
                            <th>Komentar</th>
                            <th>Rating</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${daftarUlasan}">
                            <td class="ps-3 fw-bold" th:text="${u.namaPelanggan}"></td>
                            <td class="text-muted" th:text="${u.komentar}"></td>
                            <td>
                                <span class="badge bg-warning text-dark" th:text="${u.rating} + ' ⭐'"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{'/admin/ulasan/hapus/' + ${u.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Hapus ulasan ini?')">Hapus</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarUlasan)}">
                            <td colspan="4" class="text-center py-4 text-muted">Belum ada ulasan masuk.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
