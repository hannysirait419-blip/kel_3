<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Kelola Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: #212529; color: white; position: fixed; width: 250px; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #343a40; color: white; border-left: 4px solid #198754; }
        .content { margin-left: 250px; padding: 40px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center fw-bold mb-4">ADMIN PANEL</h4>
        <a th:href="@{/admin/dashboard}">🏠 Dashboard</a>
        <a th:href="@{/admin/menu}" class="active">🍴 Kelola Menu</a>
        <a th:href="@{/admin/galeri}">📸 Kelola Galeri</a>
        <a th:href="@{/admin/ulasan}">💬 Kelola Ulasan</a>
        <div class="px-3 mt-5">
            <a th:href="@{/logout}" class="btn btn-danger text-white text-center p-2 w-100">Logout</a>
        </div>
    </div>

    <div class="content">
        <h2 class="fw-bold mb-4">Kelola Menu</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white fw-bold">Tambah Menu</div>
                    <div class="card-body">
                        <form th:action="@{/admin/menu/simpan}" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nama Menu</label>
                                <input type="text" name="nama" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Kategori</label>
                                <select name="kategori" class="form-select">
                                    <option value="Makanan">Makanan</option>
                                    <option value="Minuman">Minuman</option>
                                    <option value="Snack">Snack</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Harga</label>
                                <input type="number" name="harga" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Foto Menu</label>
                                <input type="file" name="fileGambar" class="form-control" accept="image/*">
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold">Simpan Menu</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-0 text-center">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Foto</th>
                                    <th>Nama</th>
                                    <th>Harga</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="menu : ${daftarMenu}">
                                    <td>
                                        <img th:src="${menu.gambarUrl}" 
                                             width="60" height="60" class="rounded object-fit-cover shadow-sm">
                                    </td>
                                    <td class="text-start">
                                        <div class="fw-bold" th:text="${menu.nama}"></div>
                                        <small th:text="${menu.kategori}"></small>
                                    </td>
                                    <td th:text="'Rp ' + ${menu.harga}"></td>
                                    <td>
                                        <a th:href="@{'/admin/menu/edit/' + ${menu.id}}" class="btn btn-warning btn-sm">Edit</a>
                                        <a th:href="@{'/admin/menu/hapus/' + ${menu.id}}" class="btn btn-danger btn-sm">Hapus</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
