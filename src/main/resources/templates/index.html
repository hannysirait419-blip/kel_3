<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agatha Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #F9F6EE; }
        .sidebar {
            height: 100vh;
            background-color: #1E4633;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar h3 { color: #F2542D; }
        .sidebar a {
            color: white; text-decoration: none; display: block; padding: 10px 20px; font-weight: 500;
        }
        .sidebar a:hover { background-color: #2d6a4f; }
        .content { margin-left: 250px; padding: 40px; }
    </style>
</head>
<body>

    <div th:replace="~{fragments/user-sidebar :: sidebar}"></div>

<div class="content">
    <div class="mb-5 pb-5">
        <div class="p-5 bg-white shadow-sm rounded text-center">
            <h1 class="fw-bold" style="color: #1E4633;">Selamat Datang di Agatha Cafe</h1>
            <p class="lead text-muted">Nikmati sajian kopi dan makanan terbaik kami.</p>
        </div>
    </div>
</div>

</body>
</html>
